<!-- frontend/public/logo.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Magnifying Glass Handle -->
  <path d="M75 75 L85 85" stroke="#2563eb" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Magnifying Glass Lens -->
  <circle cx="60" cy="40" r="25" stroke="#2563eb" stroke-width="5" fill="none"/>
  
  <!-- Code Brackets inside Lens -->
  <text x="60" y="45" text-anchor="middle" font-family="monospace" font-size="20" fill="#2563eb" font-weight="bold">{ }</text>
  
  <!-- Digital Circuit Pattern -->
  <path d="M10 10 L30 10 L30 30 L10 30 Z" fill="#93c5fd" opacity="0.3"/>
  <path d="M40 20 L60 20 L60 40 L40 40 Z" fill="#93c5fd" opacity="0.3"/>
  <path d="M70 30 L90 30 L90 50 L70 50 Z" fill="#93c5fd" opacity="0.3"/>
  
  <!-- Glow Effect -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>
  
  <!-- Apply glow to key elements -->
  <g filter="url(#glow)">
    <circle cx="60" cy="40" r="25" stroke="#2563eb" stroke-width="5" fill="none"/>
    <path d="M75 75 L85 85" stroke="#2563eb" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>
</svg>
