apiVersion: apps/v1
kind: Deployment
metadata:
  name: codelens-backend
  labels:
    app: codelens-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codelens-backend
  template:
    metadata:
      labels:
        app: codelens-backend
    spec:
      containers:
      - name: backend
        image: codelens-ai/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: codelens-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: codelens-secrets
              key: secret-key
        - name: PYTHONPATH
          value: "/app"
        - name: OLLAMA_MODEL
          value: "qwen3-coder:480b-cloud"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: codelens-backend-service
spec:
  selector:
    app: codelens-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
