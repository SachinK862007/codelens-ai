apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codelens-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: codelens.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: codelens-frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: codelens-backend-service
            port:
              number: 8000
